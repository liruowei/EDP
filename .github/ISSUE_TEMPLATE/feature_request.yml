name: 🚀 Feature Request
description: 提议新功能或改进
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议！请先在
        [Discussions](https://github.com/ai-nurmamat/EDP/discussions)
        确认方向后再开 Issue，以避免重复劳动。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么问题？当前有什么不便？
      placeholder: "目前 L4 融合无法处理……场景，导致……"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 设想的方案
      description: 你期望的 API 或行为
      render: python
      placeholder: |
        edp = EDP(domain, {...})
        result = edp.analyze(...)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      placeholder: "也可以用……，但缺点是……"
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: 涉及的层
      multiple: true
      options:
        - L0 数据抽象
        - L1 概率提取
        - L2 推断引擎
        - L3 流向分析
        - L4 全域感知
        - L5 资源分配
        - L6 校准
        - L7 保形预测
        - MCP Server
        - 文档/示例
        - 跨层/架构
    validations:
      required: false

  - type: checkboxes
    id: alignment
    attributes:
      label: 用途合规确认
      options:
        - label: 此功能不涉及赌博/博彩/彩票参与，不构成投资建议，符合学术研究定位
          required: true
