name: 'Close stale issues and PRs'

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issue: 60 天无活动标记 stale，再 14 天关闭
          days-before-issue-stale: 60
          days-before-issue-close: 14
          # PR: 30 天无活动标记 stale，再 10 天关闭
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-issue-message: |
            该 Issue 已 60 天无活动，将在 14 天后自动关闭。
            如仍有效，请补充信息或移除 `stale` 标签。
          stale-pr-message: |
            该 PR 已 30 天无活动，将在 10 天后自动关闭。
            如仍在进行，请更新或移除 `stale` 标签。
          close-issue-message: '因长时间无活动，本 Issue 已自动关闭。欢迎在需要时重新打开。'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          # 豁免：pinned / security / enhancement 永不过期
          exempt-issue-labels: 'pinned,security,enhancement,good-first-issue'
          exempt-pr-labels: 'pinned,security,dependencies'
          exempt-all-milestones: true
          operations-per-run: 30
