name: 🐛 Bug Report
description: 报告 EDP 框架的异常行为或计算错误
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！EDP 仅供学术研究。如涉及使用提问请移步
        [Discussions](https://github.com/ai-nurmamat/EDP/discussions)。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简明描述发生了什么，以及你预期发生什么
      placeholder: "调用 edp.analyze(...) 时，概率被错误地拉平为 0.5/0.5..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现示例
      description: 贴一段最小可复现代码
      render: python
      placeholder: |
        from edp import EDP, GenericDomain, Outcome, Evidence
        ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: "期望 rain ≈ 0.68，实际得到 0.50"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 环境
      description: EDP 版本 / Python 版本 / 操作系统
      placeholder: "edp==2.0.0 / Python 3.11 / Ubuntu 22.04"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 涉及的层（可选）
      multiple: true
      options:
        - L0 数据抽象
        - L1 概率提取 (Shin)
        - L2 推断引擎 (Bayesian/Glicko-2/聚合)
        - L3 流向分析
        - L4 全域感知
        - L5 资源分配
        - L6 校准
        - L7 保形预测
        - MCP Server
        - 不确定
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索过现有 Issues，无重复
          required: true
        - label: 我已确认这是 Bug 而非使用提问（提问请走 Discussions）
          required: true
