# PR 自动标签规则 — actions/labeler@v5
# https://github.com/actions/labeler

core:
  - changed-files:
      - any-glob-to-any-file: ['src/python/**']

mcp:
  - changed-files:
      - any-glob-to-any-file: ['mcp/**']

tests:
  - changed-files:
      - any-glob-to-any-file: ['tests/**']

examples:
  - changed-files:
      - any-glob-to-any-file: ['examples/**']

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'
          - 'CITATION.cff'

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'package.json'
          - 'package-lock.json'

legacy-js:
  - changed-files:
      - any-glob-to-any-file: ['src/js/**']
